name: Android Build & Sign

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # STEP 1: Decode the Keystore from your GitHub Secrets
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-keystore.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # STEP 2: Build and Sign the APK
    # We pass the secrets as Environment Variables so build.gradle can see them
    - name: Build with Gradle
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # STEP 3: Generate the SHA-1 (The "ID Card" for Firebase)
    - name: Get SHA-1 Fingerprint
      run: ./gradlew signingReport
      
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: magic-tortoise-signed-apk
        path: app/build/outputs/apk/release/app-release.apk
        
